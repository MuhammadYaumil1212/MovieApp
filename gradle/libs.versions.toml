lifecycleRuntimeKtx = "2.10.0"
activityCompose = "1.12.4"
composeBom = "2026.02.00"
coilCompose = "3.3.0"
androidxLifecycle = "2.10.0"
ktor = "3.4.0"
kspVersion = "2.3.5"
material = "1.10.3"
sandwichKtor = "2.2.1"
